packages:
  - "packages/*"
  - "apps/*"

# pnpm 11: don't hard-fail scripts on the pre-run deps check.
verifyDepsBeforeRun: false

# pnpm 11 build-script approval (esbuild/sharp/unrs-resolver postinstalls).
onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
