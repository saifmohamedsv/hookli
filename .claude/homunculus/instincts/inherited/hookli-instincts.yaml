# Hookli Workflow Add New Hook Doc Page

## Action

Follow the add-new-hook-doc-page workflow:
1. Create demo component in components/demos/{hook-name}-demo.tsx
2. Add hook entry to lib/hook-docs.ts
3. Add hook source to lib/hook-sources.ts
4. Add hook to lib/hooks-registry.ts
5. Update ralph/prd.json to mark the task done
6. Update ralph/progress.txt

## Evidence

- Workflow detected from commit patterns
- Frequency: ~5x per month
- Files: components/demos/{hook-name}-demo.tsx, lib/hook-docs.ts, lib/hook-sources.ts

