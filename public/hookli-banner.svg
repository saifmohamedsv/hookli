<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hookli — Simple React hooks. Typed. SSR-safe. Zero dependencies.">
  <!-- solid Prussian ground -->
  <rect width="1200" height="400" fill="#003748"/>

  <!-- mark: hook holding a state dot -->
  <g transform="translate(473 118) scale(0.86)">
    <path d="M84 10 V82 A42 42 0 1 1 0 82 V58"
          stroke="#30C5CA" stroke-width="26" stroke-linecap="round" fill="none"/>
    <circle cx="42" cy="82" r="15" fill="#FFFFFF"/>
  </g>

  <!-- wordmark -->
  <text x="617" y="228" font-family="'Avenir Next', Futura, Inter, ui-sans-serif, sans-serif"
        font-size="112" font-weight="600" letter-spacing="-3">
    <tspan fill="#FFFFFF">hookli</tspan><tspan fill="#30C5CA">.</tspan>
  </text>

  <!-- tagline -->
  <text x="600" y="296" text-anchor="middle"
        font-family="'Avenir Next', Futura, Inter, ui-sans-serif, sans-serif"
        font-size="27" font-weight="500" fill="#8FB6C2" letter-spacing="0.5">
    Simple React hooks. Typed. SSR-safe. Zero dependencies.
  </text>
</svg>
