<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hookli — a hook holding a state dot">
  <!-- tile (Premium Dark lifted chip — ground-overlay #151C27) -->
  <rect width="256" height="256" rx="56" fill="#151C27"/>
  <!-- 1px inner top-edge highlight — light catching the chip edge (premium lift) -->
  <rect x="0.75" y="0.75" width="254.5" height="254.5" rx="55.25" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5"/>
  <!-- hook: shaft, curl, upturned tip — one continuous stroke (React logo cyan) -->
  <path d="M170 68 V140 A42 42 0 1 1 86 140 V116"
        stroke="#61DAFB" stroke-width="26" stroke-linecap="round" fill="none"/>
  <!-- the state dot, held by the hook -->
  <circle cx="128" cy="140" r="15" fill="#FFFFFF"/>
</svg>
