<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hookli — type-safe React hooks. SSR-safe, tree-shakable, zero dependencies. 40 hooks.">
  <!-- ground: react.dev gray-90 -->
  <rect width="1200" height="400" fill="#23272F"/>

  <!-- decorative hook-curl quarter arcs (low opacity, edges only) -->
  <path d="M1200 34 A126 126 0 0 0 1074 160" stroke="#087EA4" stroke-width="30" stroke-linecap="round" stroke-opacity="0.28" fill="none"/>
  <path d="M0 342 A138 138 0 0 1 138 480" stroke="#61DAFB" stroke-width="30" stroke-linecap="round" stroke-opacity="0.12" fill="none"/>

  <!-- LEFT: mark + wordmark -->
  <g transform="translate(84 68) scale(0.55)">
    <path d="M96 12 V94 A48 48 0 1 1 0 94 V66" stroke="#61DAFB" stroke-width="30" stroke-linecap="round" fill="none"/>
    <circle cx="48" cy="94" r="17" fill="#FFFFFF"/>
  </g>
  <text x="176" y="154" font-family="'Geist','Geist Sans','Avenir Next',Inter,'Helvetica Neue',ui-sans-serif,sans-serif"
        font-size="74" font-weight="650" letter-spacing="-2"><tspan fill="#FFFFFF">hookli</tspan><tspan fill="#61DAFB">.</tspan></text>

  <!-- accent rule -->
  <rect x="84" y="192" width="72" height="4" rx="2" fill="#61DAFB"/>

  <!-- heading + muted meta -->
  <text x="84" y="248" font-family="'Geist','Geist Sans','Avenir Next',Inter,'Helvetica Neue',ui-sans-serif,sans-serif"
        font-size="38" font-weight="600" letter-spacing="-0.5" fill="#F6F7F9">type-safe React hooks</text>
  <text x="84" y="286" font-family="'Geist','Geist Sans','Avenir Next',Inter,'Helvetica Neue',ui-sans-serif,sans-serif"
        font-size="19" font-weight="500" letter-spacing="0.3" fill="#99A1B3">SSR-safe · tree-shakable · zero dependencies</text>

  <!-- hook-count outline pill -->
  <rect x="84" y="312" width="122" height="34" rx="17" fill="none" stroke="#61DAFB" stroke-opacity="0.65" stroke-width="1.5"/>
  <text x="145" y="334" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace"
        font-size="13" font-weight="600" letter-spacing="2.5" fill="#61DAFB">40 HOOKS</text>

  <!-- RIGHT: code window -->
  <rect x="656" y="132" width="480" height="136" rx="12" fill="#16181D" stroke="#404756" stroke-width="1"/>
  <path d="M656 168 V144 A12 12 0 0 1 668 132 H1124 A12 12 0 0 1 1136 144 V168 Z" fill="#343A46"/>
  <circle cx="682" cy="150" r="6" fill="#FF5F57"/>
  <circle cx="702" cy="150" r="6" fill="#FEBC2E"/>
  <circle cx="722" cy="150" r="6" fill="#28C840"/>
  <text x="684" y="226" xml:space="preserve" font-family="'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace"
        font-size="17" font-weight="500"><tspan fill="#61DAFB">import</tspan><tspan fill="#99A1B3"> { </tspan><tspan fill="#F6F7F9">useLocalStorage</tspan><tspan fill="#99A1B3"> } </tspan><tspan fill="#61DAFB">from</tspan><tspan fill="#EBECF0"> 'hookli'</tspan></text>
</svg>
