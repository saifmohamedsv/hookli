<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="hookli — React hooks, ready to use">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.24" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="400" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="400" rx="28" fill="url(#glow)"/>
  <!-- dotted grid -->
  <g fill="#1e293b">
    <circle cx="80"  cy="70"  r="2"/><circle cx="140" cy="70" r="2"/><circle cx="200" cy="70" r="2"/>
    <circle cx="80"  cy="330" r="2"/><circle cx="140" cy="330" r="2"/><circle cx="200" cy="330" r="2"/>
    <circle cx="1120" cy="70" r="2"/><circle cx="1060" cy="70" r="2"/>
    <circle cx="1120" cy="330" r="2"/><circle cx="1060" cy="330" r="2"/>
  </g>

  <!-- hook mark -->
  <g transform="translate(150 96)" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" fill="none">
    <circle cx="86" cy="26" r="22"/>
    <path d="M86 52 V150 A58 58 0 1 1 28 92"/>
    <path d="M28 92 l30 -6 M28 92 l6 30"/>
  </g>

  <!-- wordmark -->
  <text x="384" y="210" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace" font-size="120" font-weight="700" letter-spacing="-4">
    <tspan fill="#f8fafc">hook</tspan><tspan fill="url(#accent)">li</tspan>
  </text>

  <!-- tagline -->
  <text x="390" y="262" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="500" fill="#94a3b8">
    React hooks, ready to use — typed &amp; SSR-safe.
  </text>

  <!-- chips -->
  <g font-family="ui-monospace, monospace" font-size="20" font-weight="600">
    <g transform="translate(390 296)">
      <rect width="118" height="40" rx="20" fill="#0b1220" stroke="#334155"/>
      <text x="59" y="27" text-anchor="middle" fill="#22d3ee">11 hooks</text>
    </g>
    <g transform="translate(522 296)">
      <rect width="112" height="40" rx="20" fill="#0b1220" stroke="#334155"/>
      <text x="56" y="27" text-anchor="middle" fill="#818cf8">0 deps</text>
    </g>
    <g transform="translate(648 296)">
      <rect width="150" height="40" rx="20" fill="#0b1220" stroke="#334155"/>
      <text x="75" y="27" text-anchor="middle" fill="#c084fc">ESM + CJS</text>
    </g>
  </g>
</svg>
