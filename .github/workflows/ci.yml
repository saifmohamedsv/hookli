name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test (vitest)
        run: yarn test
      - name: Build (tsup)
        run: yarn build
